name: Refresh dashboard

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        working-directory: render
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Fetch data
        working-directory: render
        env:
          AMBIENT_WEATHER_API_KEY: ${{ secrets.AMBIENT_WEATHER_API_KEY }}
          AMBIENT_WEATHER_APPLICATION_KEY: ${{ secrets.AMBIENT_WEATHER_APPLICATION_KEY }}
          AMBIENT_WEATHER_MAC: ${{ secrets.AMBIENT_WEATHER_MAC }}
          GOOGLE_CALENDAR_ICAL_URL: ${{ secrets.GOOGLE_CALENDAR_ICAL_URL }}
        run: python fetch_data.py --out data.json

      - name: Render dashboard image
        working-directory: render
        run: python render.py --data data.json --out output/dashboard.png

      - name: Convert to e-paper buffer
        working-directory: render
        run: python convert.py --in output/dashboard.png --out output/dashboard.bin

      - name: Publish output
        run: |
          mkdir -p dashboard
          cp render/output/dashboard.png dashboard/latest.png
          cp render/output/dashboard.bin dashboard/latest.bin
          # pie_cache.json only gets written on a successful scrape (see
          # fetch_pie_watch in fetch_data.py) -- during the blackout window,
          # or before the first successful scrape ever, it won't exist yet.
          # git add fails hard on a pathspec that matches nothing, which
          # would abort this whole commit step (including the dashboard
          # image changes) -- so make sure the file always exists first.
          [ -f render/pie_cache.json ] || echo '{}' > render/pie_cache.json
          [ -f render/game_watch_cache.json ] || echo '{}' > render/game_watch_cache.json
          [ -f render/reservoir_cache.json ] || echo '{}' > render/reservoir_cache.json
          # fire_risk_cache.json is never written at all during the annual
          # Mar 16-May 14 burn ban window (the fire-risk API isn't even
          # called then) -- same missing-file guard as the others.
          [ -f render/fire_risk_cache.json ] || echo '{}' > render/fire_risk_cache.json

      - name: Commit updated dashboard
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh dashboard"
          file_pattern: "dashboard/latest.png dashboard/latest.bin render/pie_cache.json render/game_watch_cache.json render/reservoir_cache.json render/fire_risk_cache.json"
          commit_user_name: "dashboard-bot"
          commit_user_email: "actions@github.com"
