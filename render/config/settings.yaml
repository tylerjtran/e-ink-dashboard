location:
  name: "Downsville, NY"
  lat: 42.0750
  lon: -74.9763
  timezone: "America/New_York"

# For the "warmer/cooler than Philly" line in the weather box.
philly:
  lat: 39.9526
  lon: -75.1652

# Manually toggle during an active NY DEC burn ban. No clean public API was
# found for this at build time -- flip this by hand until a real source is wired up.
burn_ban_active: false

electric:
  peak_days: [mon, tue, wed, thu, fri]
  peak_start: "16:00"
  peak_end: "18:00"

ambient_weather:
  # apiKey / applicationKey / mac come from env vars (GitHub secrets):
  #   AMBIENT_WEATHER_API_KEY, AMBIENT_WEATHER_APPLICATION_KEY, AMBIENT_WEATHER_MAC
  base_url: "https://api.ambientweather.net/v1"

open_meteo:
  base_url: "https://api.open-meteo.com/v1/forecast"

# Approximate monthly climate normals for the Downsville area (proxy: Delhi, NY,
# ~10 mi away -- closest station with published normals). Used only for the
# "X warmer/cooler than normal" line. Edit freely if you find better local data.
climate_normals:
  jan: { high: 31, low: 11 }
  feb: { high: 34, low: 12 }
  mar: { high: 43, low: 22 }
  apr: { high: 55, low: 32 }
  may: { high: 67, low: 42 }
  jun: { high: 75, low: 51 }
  jul: { high: 80, low: 54 }
  aug: { high: 78, low: 53 }
  sep: { high: 70, low: 46 }
  oct: { high: 60, low: 35 }
  nov: { high: 47, low: 28 }
  dec: { high: 35, low: 18 }

usgs:
  # East Branch Delaware River at Harvard, NY (USGS-01417500). The previous
  # site (01417000, at Downsville) wasn't reporting temperature, only
  # discharge/gage height -- this one actively reports it.
  site_id: "01417500"
  # Parameter 00010 = water temperature (deg C).
  temperature_param_cd: "00010"

nyc_reservoir:
  # Scraped directly from DEP's own reservoir-levels page (server-rendered
  # HTML, not a separate API call). This replaced an earlier attempt to use
  # NYC Open Data's "Current Reservoir Levels" Socrata dataset, whose field
  # names for the Cannonsville/Pepacton block didn't match their contents
  # and whose data lagged by months -- it produced a confirmed-wrong number
  # (74% vs. the real ~89%). This page matches the number DEP shows the
  # public directly, so trust it over any Socrata dataset for this reservoir.
  dep_page_url: "https://www.nyc.gov/site/dep/water/reservoir-levels.page"
  # Rough seasonal "normal" percent-full curve for the reservoir system, used
  # only for the "Lower/Higher than normal" line. These are ballpark estimates,
  # not an official DEP normals table -- adjust if you find a better source.
  normal_pct_by_month:
    jan: 85
    feb: 87
    mar: 92
    apr: 95
    may: 96
    jun: 92
    jul: 85
    aug: 78
    sep: 73
    oct: 72
    nov: 76
    dec: 82

inaturalist:
  project_slug: "boy-scout-road"

mlb:
  team_id: 143  # Philadelphia Phillies
  team_short_name: "Phillies"

nfl:
  team_abbr: "phi"  # Philadelphia Eagles, per ESPN's site API
  team_name: "Eagles"

nba:
  team_abbr: "phi"  # Philadelphia 76ers, per ESPN's site API
  team_name: "Sixers"
